name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.asset }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: ohhi-gui-linux-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: ohhi-gui-windows-x86_64
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: ohhi-gui-macos-arm64
            ext: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Build release binary
        run: cargo build --release -p ohhi-gui --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/ohhi-gui${{ matrix.ext }}"
          dst="${{ matrix.asset }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
