name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Desktop binaries (ohhi-ui, Dioxus) ──────────────────────────────────────
  build:
    name: build (${{ matrix.asset }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: ohhi-tools-linux-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: ohhi-tools-windows-x86_64
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: ohhi-tools-macos-arm64
            ext: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Dioxus desktop (wry) needs WebKitGTK + GTK on Linux.
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config

      - name: Build release binary
        run: cargo build --release -p ohhi-ui --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/ohhi-ui${{ matrix.ext }}"
          dst="${{ matrix.asset }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}${{ matrix.ext }}
          if-no-files-found: error

  # ── Web bundle (Dioxus → wasm static site) ──────────────────────────────────
  # Best-effort: a failure here must not block the desktop release.
  web:
    name: build (web)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: web-release

      - name: Install dioxus-cli
        uses: cargo-bins/cargo-binstall@main

      - name: Install dx
        run: cargo binstall dioxus-cli@^0.6 --no-confirm

      - name: Build web bundle
        run: dx build --release --platform web --package ohhi-ui

      - name: Stage web bundle
        run: |
          out="$(find target/dx -type d -name public | head -1)"
          if [ -z "$out" ]; then echo "::error::no web output dir found"; exit 1; fi
          tar -czf ohhi-tools-web.tar.gz -C "$out" .

      - uses: actions/upload-artifact@v4
        with:
          name: ohhi-tools-web
          path: ohhi-tools-web.tar.gz
          if-no-files-found: error

  # ── Publish ─────────────────────────────────────────────────────────────────
  release:
    name: publish release
    needs: [build, web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
